project_name: "what-1_morphology_classification"
project_save_dir: "./experiments"
training: true
accelerator: "gpu"
dataloader: "mmap"
checkpoint: ""
resume_training: false

data_options:
  data_path: 
  - "/scratch/mmap_data/22663"
  - "/scratch/mmap_data/22664"
  - "/scratch/mmap_data/22665"
  - "/scratch/mmap_data/22666"
  - "/scratch/mmap_data/22667"
  - "/scratch/mmap_data/22668"
  - "/scratch/mmap_data/22670"
  - "/scratch/mmap_data/22671"
  - "/scratch/mmap_data/22672"
  val_split: 0.1
  split_seed: 42
  use_summary_stats: true
  extended_stats: true
  energy_weighting: 'si+flat'
  spectral_index: [1.0, 1.5, 1.5, 1.5, 1.5, 1.0, 1.0, 1.5, 1.5]
  target_index: 1.5
  energy_weight_bins: 50
  dom_dropout: 0.1

model_options:
  in_channels: 25
  num_patches: 128
  token_dim: 256
  num_layers: 8
  num_heads: 4
  hidden_dim: 672
  dropout: 0.1
  drop_path_rate: 0.1
  downstream_task: "morphology_classification"
  loss_fn: "cross_entropy"
  loss_kwargs:
    # sqrt-scaled inverse frequency weights, normalized so cascade (most common) = 1.00
    # Composition: 22.4M NuGen events
    # 0: cascade (32.8%), 1: starting (13.6%), 2: throughgoing (13.5%),
    # 3: stopping (17.2%), 4: uncontained (22.8%), 5: bundle (0.14%)
    class_weights: [1.00, 1.55, 1.56, 1.38, 1.20, 15.28]
  k_neighbors: 8
  pool_type: "attention"
  tokenizer_kwargs:
    knn_pool: "max_mean"

training_options:
  batch_size: 256
  lr: 0.0003
  T_max: 50
  weight_decay: 0.01
  epochs: 50
  save_epochs: 10
  num_workers: 8
  precision: "bf16"
  grad_clip: 1.0

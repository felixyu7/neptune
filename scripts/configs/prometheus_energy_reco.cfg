project_name: "neptune_prometheus_energy"
project_save_dir: "./experiments"
training: true
accelerator: "gpu"
dataloader: "mmap"
checkpoint: ""
resume_training: false

data_options:
  # New unified format - single data path with runtime splitting
  data_path: "/home/dragonlol1/data/mmap_data/all_sky_prometheus_icgeo_12chan"
  val_split: 0.2                # 20% for validation
  split_seed: 42                # For reproducible splits
  use_summary_stats: true
  energy_weighting: null
  spectral_index: 2.0
  energy_weight_bins: 50
  dom_dropout: 0.0

model_options:
  in_channels: 9
  num_patches: 64
  token_dim: 256
  num_layers: 8
  num_heads: 4
  hidden_dim: 512
  dropout: 0.1
  drop_path_rate: 0.1
  downstream_task: "energy_reco"
  loss_fn: "gaussian_nll"
  k_neighbors: 16

training_options:
  batch_size: 256
  lr: 0.0001
  T_max: 30
  weight_decay: 0.01
  epochs: 30
  save_epochs: 30
  num_workers: 8
  precision: "bf16"
  grad_clip: 1.0

project_name: "what-1_neutrino_classification"
project_save_dir: "./experiments"
training: true
accelerator: "gpu"
dataloader: "mmap"
checkpoint: ""
resume_training: false

data_options:
  data_path_0:
    - "/scratch/mmap_data/22803"
  data_path_1:
    - "/scratch/mmap_data/22663"
    - "/scratch/mmap_data/22664"
    - "/scratch/mmap_data/22665"
    - "/scratch/mmap_data/22666"
    - "/scratch/mmap_data/22667"
    - "/scratch/mmap_data/22668"
    - "/scratch/mmap_data/22670"
    - "/scratch/mmap_data/22671"
    - "/scratch/mmap_data/22672"
  val_split: 0.1
  split_seed: 42
  use_summary_stats: true
  extended_stats: true
  energy_weighting: 'si+flat'
  spectral_index: [2.0, 1.0, 1.5, 1.5, 1.5, 1.5, 1.0, 1.0, 1.5, 1.5]
  target_index: 1.5
  energy_weight_bins: 50
  dom_dropout: 0.1

model_options:
  in_channels: 25
  num_patches: 128
  token_dim: 256
  num_layers: 8
  num_heads: 4
  hidden_dim: 672
  dropout: 0.1
  drop_path_rate: 0.1
  downstream_task: "neutrino_classification"
  # Loss options: "bce" | "focal" | "pauc"
  # - focal: loss_kwargs {gamma: 2.0, alpha: 0.25}
  # - pauc: loss_kwargs {alpha: 0.01, margin: 0.0}  (alpha=0.001 needs batch>=2048)
  loss_fn: "pauc"
  k_neighbors: 8
  pool_type: "attention"
  tokenizer_kwargs:
    knn_pool: "max_mean"

training_options:
  batch_size: 512
  lr: 0.0003
  T_max: 30
  weight_decay: 0.01
  epochs: 30
  save_epochs: 10
  num_workers: 8
  precision: "bf16"
  grad_clip: 1.0

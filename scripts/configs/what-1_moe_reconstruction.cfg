project_name: "what-1_moe_reconstruction"
project_save_dir: "./experiments"
training: true
accelerator: "gpu"
dataloader: "mmap"
checkpoint: ""
resume_training: false

data_options:
  data_path:
  - "/home/dragonlol1/data/mmap_data/22670"
  - "/home/dragonlol1/data/mmap_data/22671"
  - "/home/dragonlol1/data/mmap_data/22672"
  val_split: 0.2
  split_seed: 42
  use_summary_stats: true
  extended_stats: true
  energy_weighting: "flat"
  spectral_index: [2.0, 2.0, 2.0]
  energy_weight_bins: 50
  dom_dropout: 0.1

model_options:
  model_type: "neptune_moe"
  in_channels: 25
  num_patches: 64
  token_dim: 256
  num_layers: 8
  num_heads: 4
  hidden_dim: 672
  dropout: 0.1
  drop_path_rate: 0.1
  k_neighbors: 16
  pool_type: "attention"
  tokenizer_kwargs:
    knn_pool: "max_mean"
  downstream_task: "moe_reconstruction"
  loss_fn: "moe"
  loss_kwargs:
    dir_loss: "iag"
    w_morph: 1.0
    w_energy: 1.0
    w_dir: 1.0
    class_weights: [1.98, 1.15, 1.05, 1.00, 1.72, 13.06]
  energy_gate_threshold: 700  # GeV
  noise_threshold: 0.8         # P(uncontained) above which events are skipped at inference
  expert_configs:
    dir_low_track: # low e requires less patches
      num_patches: 32

training_options:
  batch_size: 256
  lr: 0.0003
  T_max: 5
  weight_decay: 0.01
  epochs: 5
  save_epochs: 5
  num_workers: 8
  precision: "bf16"
  grad_clip: 1.0

project_name: "what-1_moe_reconstruction"
project_save_dir: "./experiments"
training: true
accelerator: "gpu"
dataloader: "mmap"
checkpoint: ""
resume_training: false

data_options:
  data_path:
  - "/home/dragonlol1/data/mmap_data/22670"
  - "/home/dragonlol1/data/mmap_data/22671"
  - "/home/dragonlol1/data/mmap_data/22672"
  val_split: 0.2
  split_seed: 42
  use_summary_stats: true
  extended_stats: true
  energy_weighting: "flat"
  spectral_index: [2.0, 2.0, 2.0]
  energy_weight_bins: 50
  dom_dropout: 0.1

model_options:
  model_type: "neptune_moe"
  in_channels: 25
  num_patches: 64
  token_dim: 256
  num_layers: 4              # retained for backwards compat; backbone_num_layers overrides
  num_heads: 4
  hidden_dim: 672
  dropout: 0.1
  drop_path_rate: 0.1
  k_neighbors: 16
  pool_type: "attention"
  tokenizer_kwargs:
    knn_pool: "max_mean"
  # v9 DeepSeek-faithful architecture knobs
  backbone_num_layers: 4     # shared backbone depth
  router_num_layers: 4       # morphology router depth (4+4 = 8L for morph path)
  moe_num_layers: 4          # MoE expert stack depth (4+4 = 8L for energy/dir path)
  num_routed_experts: 6      # one routed FFN per morphology class
  shared_hidden_dim: 672     # shared FFN hidden dim (full size)
  routed_hidden_dim: 336     # routed FFN hidden dim (0.5x shared)
  route_temperature: 1.5     # softmax temperature during training (prevents routing collapse)
  detach_routing: true       # router trained purely by CE loss, MoE gradients don't flow through
  downstream_task: "moe_reconstruction"
  loss_fn: "moe"
  loss_kwargs:
    dir_loss: "iag"
    w_morph: 1.0
    w_energy: 1.0
    w_dir: 1.0
    class_weights: [1.98, 1.15, 1.05, 1.00, 1.72, 13.06]

training_options:
  batch_size: 256
  lr: 0.0003
  T_max: 5
  weight_decay: 0.01
  epochs: 5
  save_epochs: 5
  num_workers: 8
  precision: "bf16"
  grad_clip: 1.0

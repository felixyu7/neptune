project_name: "what-1_angular_reco"
project_save_dir: "./experiments"
training: true
accelerator: "gpu"
dataloader: "mmap"
checkpoint: ""
resume_training: false

data_options:
  data_path: 
  - "/home/dragonlol1/data/mmap_data/22670"
  - "/home/dragonlol1/data/mmap_data/22671"
  - "/home/dragonlol1/data/mmap_data/22672"
  val_split: 0.2
  split_seed: 42
  use_summary_stats: true
  extended_stats: true
  energy_weighting: 'si+flat'
  spectral_index: [1.0, 1.5, 1.5]
  target_index: 1.5
  energy_weight_bins: 50
  dom_dropout: 0.1

model_options:
  model_type: "neptune"
  in_channels: 25
  num_patches: 128
  token_dim: 256
  num_layers: 8
  num_heads: 4
  hidden_dim: 672
  dropout: 0.1
  drop_path_rate: 0.1
  downstream_task: "angular_reco"
  loss_fn: "iag"
  k_neighbors: 8
  pool_type: "attention"
  tokenizer_kwargs:
    knn_pool: "max_mean"

training_options:
  batch_size: 256
  lr: 0.0003
  T_max: 30
  weight_decay: 0.01
  epochs: 30
  save_epochs: 10
  num_workers: 8
  precision: "bf16"
  grad_clip: 1.0
